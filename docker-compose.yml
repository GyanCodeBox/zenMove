version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: zenmove_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenmove
      POSTGRES_PASSWORD: zenmove
      POSTGRES_DB: zenmove_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenmove"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (OTP cache + job queue) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zenmove_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenmove_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app                        # hot-reload in dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
